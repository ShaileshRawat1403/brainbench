repo_agents:
  tessera:
    repo_id: tessera
    handoff_scope: observation_only
    display_name: Tessera
    status: paused
    cadence: weekly
    cadence_override: test_cycle
    local_path: "systems/tessera"
    context_file: "brain/repo-context/tessera.md"
    allowed_outputs:
      - "bench/repo-handoffs/daily/"
      - "bench/repo-handoffs/weekly/"
    allowed_actions:
      - observe
      - summarize
      - recommend
    forbidden_actions:
      - edit_repo_source
      - change_state
      - approve_decision
      - open_pr
